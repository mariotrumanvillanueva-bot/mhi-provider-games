<style>
:root{--bg:#07151f;--card:#102633;--card2:#17394a;--text:#f3fbf8;--muted:#b7d4d1;--gold:#ffd166;--red:#ef476f;--green:#06d6a0;--blue:#118ab2;--border:rgba(255,255,255,.15)}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top left,rgba(245,200,76,.16),transparent 35%),radial-gradient(circle at bottom right,rgba(196,61,75,.12),transparent 35%),var(--bg);color:var(--text)}
.app{width:min(1240px,94vw);margin:0 auto;padding:28px 0}.hero{display:flex;justify-content:space-between;gap:16px;align-items:center;padding:24px;border:1px solid var(--border);border-radius:24px;background:linear-gradient(135deg,rgba(35,35,54,.98),rgba(23,23,34,.9));margin-bottom:18px;box-shadow:0 20px 60px rgba(0,0,0,.28)}
.eyebrow{color:var(--gold);font-weight:800;text-transform:uppercase;letter-spacing:2px;font-size:12px;margin:0 0 8px}
h1,h2,h3,h4,p{margin-top:0}.layout{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(320px,.65fr);gap:18px}.card{padding:22px;border:1px solid var(--border);background:rgba(23,23,34,.95);border-radius:22px;box-shadow:0 15px 40px rgba(0,0,0,.22)}
.game-zone{min-height:520px}.side-board{grid-row:span 4;position:sticky;top:16px;align-self:start;max-height:calc(100vh - 32px);overflow:auto}
label{display:block;color:var(--muted);font-size:13px;margin:10px 0 7px}input,select{width:100%;padding:14px;border-radius:14px;border:1px solid var(--border);background:#101019;color:var(--text);margin-bottom:10px}
button{border:0;border-radius:14px;padding:13px 16px;background:linear-gradient(135deg,var(--gold),#ffdf7a);color:#18120a;font-weight:800;cursor:pointer;margin:3px 2px;position:relative;z-index:2}
button:disabled{opacity:.45;cursor:not-allowed}.secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}.danger{background:rgba(196,61,75,.18);color:#ffb6be;border:1px solid rgba(196,61,75,.45)}
.hint,.feedback,.mini{color:var(--muted);font-size:13px}.answers{display:grid;gap:10px}.answer-btn{text-align:left;background:#101019;color:var(--text);border:1px solid var(--border);width:100%}.answer-btn.correct{background:rgba(76,201,138,.2);border-color:rgba(76,201,138,.65)}.answer-btn.wrong{background:rgba(196,61,75,.2);border-color:rgba(196,61,75,.65)}
.pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}.pill{display:inline-flex;padding:8px 10px;border-radius:999px;background:rgba(245,200,76,.14);color:var(--gold);font-size:12px;font-weight:800}
.hidden{display:none!important}.panel{margin-top:14px;border-top:1px solid var(--border);padding-top:14px}pre{white-space:pre-wrap;background:#101019;border:1px solid var(--border);border-radius:14px;padding:12px;max-height:300px;overflow:auto}
ol{padding-left:24px}li{padding:10px 0;border-bottom:1px solid var(--border)}.leaderboard-head{display:flex;justify-content:space-between;gap:10px;align-items:center}.locked-export{margin-top:16px;border-top:1px solid var(--border);padding-top:14px}.button-row{margin-top:14px}
.matching-box{display:grid;gap:10px}.match-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;background:#101019;border:1px solid var(--border);padding:10px;border-radius:14px}.match-row select{margin:0}.admin-note{border-left:4px solid var(--gold);padding-left:10px;color:var(--muted)}
@media(max-width:920px){.layout{grid-template-columns:1fr}.side-board{position:static;max-height:none}.hero{flex-direction:column;align-items:stretch}}
body{background:radial-gradient(circle at 20% 10%,rgba(6,214,160,.20),transparent 30%),radial-gradient(circle at 80% 20%,rgba(17,138,178,.18),transparent 32%),radial-gradient(circle at 50% 85%,rgba(255,209,102,.12),transparent 35%),var(--bg)!important}
.hero{background:linear-gradient(135deg,rgba(17,57,74,.98),rgba(7,21,31,.95))!important;border-color:rgba(255,209,102,.25)!important}
.theme-art{font-size:76px;filter:drop-shadow(0 8px 20px rgba(0,0,0,.35));line-height:1}
.card{background:rgba(16,38,51,.96)!important}
button{background:linear-gradient(135deg,var(--gold),#ffe6a6)!important}
.secondary{background:var(--card2)!important;color:var(--text)!important;border:1px solid var(--border)!important}
.danger{background:rgba(239,71,111,.18)!important;color:#ffd0dc!important;border:1px solid rgba(239,71,111,.55)!important}
.pill{background:rgba(6,214,160,.16)!important;color:#adffe6!important}
.answer-btn{background:#07151f!important;color:var(--text)!important}
.answer-btn.correct{background:rgba(6,214,160,.25)!important}
.answer-btn.wrong{background:rgba(239,71,111,.23)!important}

</style>
